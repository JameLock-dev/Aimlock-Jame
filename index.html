<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050509" />
    <title>AIMLOCK JAME — Secure Access</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="login-page">
    <main class="phone-shell login-shell">
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>
      <div class="scan-grid"></div>

      <section class="login-hero" aria-label="AIMLOCK JAME login">
        <div class="brand-orbit" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <p class="eyebrow">SECURE ACCESS</p>
        <h1 class="brand-logo">
          <span>AIMLOCK</span>
          <b>JAME</b>
        </h1>
        <p class="brand-subtitle">PRIVATE CONTROL CENTER</p>
      </section>

      <section class="glass-card login-card">
        <div class="card-corner corner-a"></div>
        <div class="card-corner corner-b"></div>
        <div class="login-title-row">
          <div>
            <h2>AIMLOCK <span>JAME</span></h2>
            <p>BY JAME FF</p>
          </div>
          <div class="status-chip"><i></i> ONLINE</div>
        </div>

        <label class="input-wrap" for="licenseKey">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M7 11V8a5 5 0 0 1 10 0v3"/><rect x="5" y="11" width="14" height="10" rx="2.5"/><path d="M12 15v2"/></svg>
          </span>
          <input id="licenseKey" type="password" placeholder="Nhập mật khẩu hoặc Key Mua" autocomplete="off" />
          <button id="toggleKey" class="icon-btn" type="button" aria-label="Ẩn hiện key">
            <svg viewBox="0 0 24 24"><path d="M2.5 12S6 5.8 12 5.8 21.5 12 21.5 12 18 18.2 12 18.2 2.5 12 2.5 12Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </label>

        <button id="activateBtn" class="primary-btn" type="button">
          <span class="bolt" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M13 2 4.5 13.4h6.3L9.7 22 20 9.3h-6.5L13 2Z"/></svg></span>
          <span>KÍCH HOẠT JAME</span>
        </button>

        <p id="loginStatus" class="ready-line"><i></i><span>Sẵn sàng kích hoạt</span></p>
      </section>

      <section class="quick-zone login-quick" aria-label="Liên kết nhanh">
        <div class="section-divider"><span>KẾT NỐI NHANH</span></div>
        <div class="quick-grid two">
          <a class="quick-button" href="https://www.tiktok.com/@jame.ff.11" target="_blank" rel="noopener">
            <span class="social tiktok">♪</span>
            <strong>TikTok</strong>
          </a>
          <a class="quick-button" href="https://zalo.me/0333635135" target="_blank" rel="noopener">
            <span class="social zalo">Z</span>
            <strong>Zalo</strong>
          </a>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
