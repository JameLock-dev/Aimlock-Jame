<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIMLOCK JAME - Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-dark page-login page-login-v13">
  <main class="app-shell login-shell">
    <section class="hero-block hero-block-v15">
      <div class="login-hero-card-v15">
        <div class="login-hero-glow-v15"></div>
        <div class="logo-stack large logo-stack-v15">
          <div class="logo-orbit-v18">
            <span class="logo-ring-v18 outer"></span>
            <span class="logo-ring-v18 inner"></span>
            <img src="logo.png" alt="AIMLOCK JAME" class="brand-logo" />
          </div>
        </div>
        <div class="hero-subtitle hero-subtitle-v15">
          <span></span>
          <p>PRIVATE GAMING ACCESS</p>
          <span></span>
        </div>
      </div>
    </section>

    <section class="panel login-panel">
      <div class="panel-head login-head">
        <div class="mini-brand">
          <img src="logo.png" alt="AIMLOCK JAME" class="mini-logo" />
          <div>
            <div class="mini-title">AIMLOCK JAME</div>
            <div class="mini-caption">BY JAME FF</div>
          </div>
        </div>
        <div class="status-pill online"><span class="dot"></span>ONLINE</div>
      </div>

      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/><circle cx="12" cy="15" r="1.2"/></svg>
        </span>
        <input id="keyInput" type="password" placeholder="Nhập mật khẩu hoặc Key Mua" autocomplete="off" />
        <button class="ghost-icon" id="togglePassword" type="button" aria-label="Hiện key">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <div class="dual-actions">
        <a class="secondary-btn key-action-v27 free-key-v27" id="freeKeyBtn" href="https://link-cua-ban.com/lay-key" target="_blank" rel="noopener">
          <span class="key-icon-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="12" r="3.5"/><path d="M11.5 12H22"/><path d="M18 12v-2.5"/><path d="M20.5 12v2.5"/></svg>
          </span>
          <span class="key-copy-v35"><strong>NHẬN KEY MIỄN PHÍ</strong></span>
          <span class="key-arrow-v29" aria-hidden="true">›</span>
        </a>
        <button class="secondary-btn key-action-v27 paste-key-v27" id="pasteKeyBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="8" y="3" width="8" height="4" rx="1.5"/><path d="M8 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><path d="M9 12h6M9 16h6"/></svg>
          <span>DÁN KEY</span>
        </button>
      </div>

      <button class="primary-btn" id="activateBtn" type="button">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"/></svg>
        <span>KÍCH HOẠT AIMLOCK</span>
      </button>

      <div class="ready-state" id="loginStatus"><span class="dot"></span>Kích Hoạt AIMLOCK JAME</div>
    </section>

    <section class="quick-links-card compact">
      <h3>KẾT NỐI NHANH</h3>
      <div class="quick-links two-col">
        <a class="quick-link social-link-v27 tiktok-link-v27" href="https://www.tiktok.com/@jame.ff.11" target="_blank" rel="noopener">
          <span class="social-mark tiktok-mark" aria-hidden="true">
            <svg viewBox="0 0 64 64" focusable="false" aria-hidden="true">
              <path class="tt-shadow-cyan" d="M39 11c2.2 5.6 6.8 10.5 12.8 13.1v8.5c-4.9-.2-9.4-1.7-13-4.2v12.8c0 8.8-7.2 16-16 16s-16-7.2-16-16 7.2-16 16-16c1.3 0 2.5.2 3.7.4v8.8c-1.1-.4-2.3-.6-3.6-.6-4 0-7.2 3.2-7.2 7.2s3.2 7.2 7.2 7.2 7.5-3.1 7.5-8.1V7.8H39z"/>
              <path class="tt-shadow-red" d="M40.5 9.5c2.2 5.6 6.8 10.5 12.8 13.1v8.5c-4.9-.2-9.4-1.7-13-4.2v12.8c0 8.8-7.2 16-16 16s-16-7.2-16-16 7.2-16 16-16c1.3 0 2.5.2 3.7.4v8.8c-1.1-.4-2.3-.6-3.6-.6-4 0-7.2 3.2-7.2 7.2s3.2 7.2 7.2 7.2 7.5-3.1 7.5-8.1V6.3h8.6z"/>
              <path class="tt-main" d="M39.7 10.2c2.2 5.6 6.8 10.5 12.8 13.1v8.5c-4.9-.2-9.4-1.7-13-4.2v12.8c0 8.8-7.2 16-16 16s-16-7.2-16-16 7.2-16 16-16c1.3 0 2.5.2 3.7.4v8.8c-1.1-.4-2.3-.6-3.6-.6-4 0-7.2 3.2-7.2 7.2s3.2 7.2 7.2 7.2 7.5-3.1 7.5-8.1V7h8.6z"/>
            </svg>
          </span>
          <span>TikTok</span>
        </a>
        <a class="quick-link social-link-v27 zalo-link-v27" href="https://zalo.me/0333635135" target="_blank" rel="noopener">
          <span class="social-mark zalo-mark" aria-hidden="true"><span>Zalo</span></span>
          <span>Zalo</span>
        </a>
      </div>
    </section>

    <div class="footer-caption">PRIVATE CONTROL CENTER</div>
  </main>

  <div class="toast" id="toast"></div>
  <script src="api-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
