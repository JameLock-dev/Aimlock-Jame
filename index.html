<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bảng Điều Khiển Hiệu Năng</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="bg"></div>

<div class="container">

    <!-- THÔNG SỐ HỆ THỐNG -->

    <div class="card">

        <div class="title">

            <span>📊 THÔNG SỐ HỆ THỐNG</span>

            <div class="status">

                CPU <span id="cpuTop">52%</span>

                RAM <span id="ramTop">46%</span>

                PING <span id="pingTop">12ms</span>

            </div>

        </div>

        <canvas id="chart"></canvas>

        <div class="info">

            <div class="box">

                <h3>CPU</h3>

                <h1 id="cpu">49%</h1>

                <p>Mức sử dụng CPU</p>

            </div>

            <div class="box">

                <h3>RAM</h3>

                <h1 id="ram">44%</h1>

                <p>Bộ nhớ đang sử dụng</p>

            </div>

            <div class="box">

                <h3>ĐỘ TRỄ</h3>

                <h1 id="ping">12 ms</h1>

                <p>Kết nối mạng</p>

            </div>

        </div>

    </div>

    <!-- CHỨC NĂNG -->

    <div class="card">

        <div class="title">

            <span>⚙️ CHỨC NĂNG HỆ THỐNG</span>

            <span class="badge">ĐANG HOẠT ĐỘNG</span>

        </div>

        <div id="functionList"></div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
