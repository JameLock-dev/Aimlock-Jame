<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIMLOCK JAME - Cyber Elite Access</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-login">
  <main class="app-shell login-shell purple-elite-shell">
    <section class="login-hero">
      <img src="logo.png" alt="AIMLOCK JAME" class="hero-logo" />
      <div class="hero-title-wrap">
        <h1 class="hero-title">AIMLOCK</h1>
        <p class="hero-sub">JAME</p>
      </div>
      <div class="hero-chip">CYBER ELITE ACCESS</div>
    </section>

    <section class="elite-card login-card-purple">
      <div class="card-corners"></div>
      <div class="login-head-purple">
        <div>
          <p class="eyebrow">SECURE LOGIN</p>
          <h2>Kích hoạt quyền truy cập</h2>
          <span class="head-note">Nhập key để mở bảng điều khiển Cyber Elite.</span>
        </div>
        <div class="status-chip online"><span class="dot"></span>READY</div>
      </div>

      <div class="input-wrap purple-input">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/><circle cx="12" cy="15" r="1.2"/></svg>
        </span>
        <input id="keyInput" type="password" placeholder="Nhập mật khẩu hoặc Key Mua" autocomplete="off" />
        <button class="ghost-icon" id="togglePassword" type="button" aria-label="Hiện key">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <div class="dual-actions elite-actions">
        <a class="secondary-btn purple-btn" id="freeKeyBtn" href="https://link-cua-ban.com/lay-key" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-7"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/><path d="M7.5 7a2.5 2.5 0 1 1 0-5c2 0 4.5 5 4.5 5"/><path d="M16.5 7a2.5 2.5 0 1 0 0-5c-2 0-4.5 5-4.5 5"/></svg>
          <span>LẤY KEY MIỄN PHÍ</span>
        </a>
        <button class="secondary-btn purple-btn" id="pasteKeyBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="3" width="8" height="4" rx="1.5"/><path d="M8 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><path d="M9 12h6M9 16h6"/></svg>
          <span>DÁN KEY</span>
        </button>
      </div>

      <button class="primary-btn purple-primary" id="activateBtn" type="button">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"/></svg>
        <span>KÍCH HOẠT JAME</span>
      </button>

      <div class="ready-state purple-ready" id="loginStatus"><span class="dot"></span>Sẵn sàng kích hoạt</div>
    </section>

    <section class="quick-links-card purple-links compact">
      <h3>KẾT NỐI NHANH</h3>
      <div class="quick-links two-col">
        <a class="quick-link" href="https://www.tiktok.com/" target="_blank" rel="noopener">
          <span class="social-mark tiktok-mark">♪</span>
          <span>TikTok</span>
        </a>
        <a class="quick-link" href="https://zalo.me/" target="_blank" rel="noopener">
          <span class="social-mark zalo-mark">Z</span>
          <span>Zalo</span>
        </a>
      </div>
    </section>

    <div class="footer-caption">PURPLE ELITE CONTROL CENTER</div>
  </main>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
