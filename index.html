<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050000" />
    <title>AIMLOCK JAME - Login</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-login">
    <main class="app-frame login-frame">
      <div class="bg-hud" aria-hidden="true"></div>
      <div class="edge-glow" aria-hidden="true"></div>

      <header class="login-hero">
        <div class="crosshair-mark" aria-hidden="true"></div>
        <div class="logo logo-xl" aria-label="AIMLOCK JAME">
          <span class="logo-aim">AIMLOCK</span>
          <span class="logo-jame">J A M E</span>
        </div>
        <div class="secure-chip">SECURE ACCESS</div>
      </header>

      <section class="login-panel panel-cut">
        <div class="panel-shine" aria-hidden="true"></div>
        <h1 class="product-title"><span>AIMLOCK</span> <b>JAME</b></h1>
        <p class="byline">BY JAME FF</p>

        <label class="key-field" for="licenseKey">
          <svg class="field-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10V8a5 5 0 0 1 10 0v2"/><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M12 14v3"/></svg>
          <input id="licenseKey" type="password" placeholder="Nhập mật khẩu hoặc Key Mua" autocomplete="off" />
          <button id="toggleKey" class="ghost-icon" type="button" aria-label="Ẩn hiện key">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </label>

        <button id="activateBtn" class="activate-button" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13 2 4 14h7l-1 8 10-13h-7l0-7Z"/></svg>
          <span>KÍCH HOẠT JAME</span>
        </button>

        <p id="loginStatus" class="ready-status"><i></i><span>Sẵn sàng kích hoạt</span></p>
      </section>

      <section class="quick-links login-links" aria-label="Kết nối nhanh">
        <h2 class="section-title"><span>KẾT NỐI NHANH</span></h2>
        <div class="quick-grid">
          <a class="quick-card" href="#" aria-label="TikTok"><span class="tiktok-mark">♪</span><strong>TikTok</strong></a>
          <a class="quick-card" href="#" aria-label="Zalo"><span class="zalo-mark">Z</span><strong>Zalo</strong></a>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
